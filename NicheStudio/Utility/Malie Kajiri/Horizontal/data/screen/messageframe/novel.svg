<svg width="1024px" height="600px" xmlns:a="http://www.adobe.com/svg10-extensions" xmlns:m="" xmlns:ui="">
	<defs>
		<filter id='Multiply'>
			<feBlend mode='multiply' in2='BackgroundImage' in='SourceGraphic'/>
		</filter>
		<filter id='Screen'>
			<feBlend mode='screen' in2='BackgroundImage' in='SourceGraphic'/>
		</filter>
	</defs>
	<g id='hideframe'>
		<image id='base' x='0' y='0' width='1024' height='600' xlink:href='./novel.png'/>
		<ui:custom id='message' x='100' y='100' width='824' height='400'/>
	</g>
</svg>
